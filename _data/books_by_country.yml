# Data for the interactive map at /books/.
# Country codes are ISO 3166-1 alpha-2 (https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2).
#
# home: where the circle marker is drawn — hometown, not current residence.
#
# books: one entry per country.
#   status: "read" or "tbr" (to be read)
#   name:   country display name, shown in the tooltip
#   title:  book title
#   author: book author (optional)

# pinX/pinY place the star precisely (SVG units, viewBox 2000x1001) since
# svgMap's automatic country-center placement isn't precise enough for a city.
# These were derived for Uberlandia, MG by calibrating against Brazil's own
# rendered shape in this map — recompute if you ever move the marker.
home:
  country: BR
  label: "Uberlândia, Brazil"
  pinX: 706
  pinY: 693

